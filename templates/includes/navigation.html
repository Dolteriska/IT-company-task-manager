<div class="container position-sticky z-index-sticky top-0">
  <div class="row">
    <div class="col-12">
      <nav class="navbar navbar-expand-lg blur blur-rounded top-0 z-index-fixed shadow position-absolute my-3 py-2 start-0 end-0 mx-4">
        <div class="container-fluid">
          <a class="navbar-brand font-weight-bolder ms-sm-3" href="{% url 'tasks:index' %}">
            Main Page
          </a>

          <button class="navbar-toggler shadow-none ms-2" type="button" data-bs-toggle="collapse" data-bs-target="#navigation" aria-controls="navigation" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon mt-2">
              <span class="navbar-toggler-bar bar1"></span>
              <span class="navbar-toggler-bar bar2"></span>
              <span class="navbar-toggler-bar bar3"></span>
            </span>
          </button>

          <div class="collapse navbar-collapse pt-3 pb-2 py-lg-0" id="navigation">
            <ul class="navbar-nav navbar-nav-hover ms-lg-auto">
              <li class="nav-item mx-2">
                <a class="nav-link ps-2 d-flex justify-content-between cursor-pointer align-items-center" href="/workers/">
                  Workers
                </a>
              </li>
            <li class="nav-item mx-2">
                <a class="nav-link ps-2 d-flex justify-content-between cursor-pointer align-items-center" href="/tasks/">
                  Tasks
                </a>
              </li>
            <li class="nav-item mx-2">
              <a class="nav-link ps-2 d-flex justify-content-between cursor-pointer align-items-center" href="/task_types/">
                Task types
              </a>
            </li>

              <li class="nav-item dropdown dropdown-hover mx-2">
                <a class="nav-link ps-2 d-flex justify-content-between cursor-pointer align-items-center" id="dropdownMenuPages" data-bs-toggle="dropdown" aria-expanded="false">
                  Account
                  <img src="{{ ASSETS_ROOT }}/img/down-arrow-dark.svg" alt="down-arrow" class="arrow ms-1">
                </a>
                <div class="dropdown-menu dropdown-menu-animation dropdown-md p-3 border-radius-lg mt-0 mt-lg-3" aria-labelledby="dropdownMenuPages">

                  {% if user.is_authenticated %}
                    <h6 class="dropdown-header text-dark font-weight-bolder px-0">Hello, {{ user.username }}!</h6>
                    <form action="{% url 'tasks:worker-detail' pk=user.pk %}" method="get" style="display:inline;">
                    <button type="submit" class="dropdown-item border-radius-md">My account</button>
                    </form>
                    <form action="{% url 'tasks:logout' %}" method="post" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="dropdown-item border-radius-md">Logout</button>
                    </form>
                  {% else %}
                    <a href="{% url 'tasks:login' %}" class="dropdown-item border-radius-md">Login</a>
                    <a href="{% url 'tasks:register' %}" class="dropdown-item border-radius-md">Registration</a>
                  {% endif %}

                </div>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </div>
  </div>
</div>
